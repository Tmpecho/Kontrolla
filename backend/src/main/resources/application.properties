spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kontrolla}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kontrolla}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kontrolla}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
server.error.include-message=never
app.security.jwt.issuer=kontrolla-backend
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-me-change-me-change-me-change-me}
app.security.jwt.access-token-ttl=PT15M
app.security.refresh.cookie-name=kontrolla_refresh_token
app.security.refresh.cookie-path=/api/v1/auth
app.security.refresh.same-site=Lax
app.security.refresh.secure-cookie=${APP_SECURITY_REFRESH_SECURE_COOKIE:false}
app.security.refresh.ttl=P14D
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.security.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.security.bootstrap-admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:Platform}
app.security.bootstrap-admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Admin}
