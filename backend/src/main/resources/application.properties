spring.application.name=backend
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
server.error.include-message=never
app.security.jwt.issuer=kontrolla-backend
app.security.jwt.access-token-ttl=PT15M
app.security.refresh.cookie-name=kontrolla_refresh_token
app.security.refresh.cookie-path=/api/v1/auth
app.security.refresh.same-site=Lax
app.security.refresh.ttl=P14D
