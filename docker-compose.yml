services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8080}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    networks:
      - kontrolla

  backend:
    image: eclipse-temurin:25-jdk
    working_dir: /workspace/backend
    command:
      - sh
      - -c
      - ./gradlew bootRun --no-daemon
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-kontrolla}"
      SPRING_DATASOURCE_USERNAME: "${MYSQL_USER:-kontrolla}"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_PASSWORD:-kontrolla}"
    volumes:
      - ./backend:/workspace/backend
      - backend_gradle_cache:/root/.gradle
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kontrolla

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-kontrolla}"
      MYSQL_USER: "${MYSQL_USER:-kontrolla}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-kontrolla}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kontrolla

networks:
  kontrolla:

volumes:
  backend_gradle_cache:
  frontend_node_modules:
  mysql_data:
