services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - kontrolla

networks:
  kontrolla:

volumes:
  frontend_node_modules:
